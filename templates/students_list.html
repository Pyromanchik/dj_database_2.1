<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список учеников</title>
</head>
<body>
    <h1>Список учеников</h1>

    {% for student in students %}
        <div style="margin-bottom: 20px;">
            <h3>{{ student.name }}</h3>
            <ul>
                {% for teacher in student.teachers.all %}
                    <li>{{ teacher.name }} — {{ teacher.subject }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endfor %}
</body>
</html>
